openapi: 3.1.0
info:
  title: 墨墨开放 API
  version: v1
  description: |+
    # 说明
    1. 获取请求凭证，有两种方式获取
       1. 通过墨墨背单词 App：我的 -> 更多设置 -> 实验功能 -> 开放 API
       2. 点击[此处](https://open.maimemo.com/open/api/v1/tokens/openapi)获取
    2. 将请求凭证放在 `Authorization: Beraer XXX` 中，curl 示例如下：
        ```bash
        curl --request GET \
          --url https://open.maimemo.com/open/api/v1/phrases \
          --header 'Accept: application/json' \
          --header 'Authorization: Bearer xxx'
        ```

    ## 请求频控
    - 10 秒 20 次
    - 60 秒 40 次
    - 5 小时 2000 次
    ## 错误码
    ### 释义
    | 状态码 | 错误码 | 说明 |
    | ----- | ----- | --- |


    ### 内容
    | 状态码 | 错误码 | 说明 |
    | ----- | ----- | --- |


    ### 助记
    | 状态码 | 错误码 | 说明 |
    | ----- | ----- | --- |


    ### 云词本
    | 状态码 | 错误码 | 说明 |
    | ----- | ----- | --- |


    ### 例句
    | 状态码 | 错误码 | 说明 |
    | ----- | ----- | --- |


    ### 学习数据（公测）
    | 状态码 | 错误码 | 说明 |
    | ----- | ----- | --- |


    ### 令牌
    | 状态码 | 错误码 | 说明 |
    | ----- | ----- | --- |


    ### 单词
    | 状态码 | 错误码 | 说明 |
    | ----- | ----- | --- |


paths:
  /api/v1/interpretations:
    servers: &ref_0
      - url: https://open.maimemo.com/open
        description: 生产服务
      - url: https://open-dev.maimemo.com/open
        description: 测试服务
    get:
      tags:
        - 释义
        - 墨墨背单词
      operationId: >-
        maimemo.openapi.interpretation.v1.InterpretationService.ListInterpretations
      summary: 获取释义
      requestBody: {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                description: 暂无文档
                properties:
                  interpretations:
                    description: 释义列表<br><br>引用自：[Interpretation](/schemas/Interpretation)
                    type: array
                    items:
                      $ref: '#/components/schemas/Interpretation'
                required:
                  - interpretations
      parameters:
        - name: voc_id
          in: query
          deprecated: false
          required: true
          description: 单词 id
          schema:
            description: 单词 id
            type: string
            example: 5a7BFf4F63612e5AD9fdebB7a50D3881
      security:
        - user:
            - ''
      description: 获取单词下自己创建的释义
    post:
      tags:
        - 释义
        - 墨墨背单词
      operationId: >-
        maimemo.openapi.interpretation.v1.InterpretationService.CreateInterpretation
      summary: 创建释义
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: 暂无文档
              properties:
                interpretation:
                  description: ''
                  type: object
                  properties:
                    voc_id:
                      description: 单词 id
                      type: string
                      example: 5a7BFf4F63612e5AD9fdebB7a50D3881
                    interpretation:
                      description: 释义
                      type: string
                      example: n. 苹果
                    tags:
                      description: 标签
                      type: array
                      example:
                        - 考研
                      items:
                        type: string
                    status:
                      description: >-
                        状态

                        @Example
                        PUBLISHED<br><br>引用自：[InterpretationStatus](/schemas/InterpretationStatus)
                      type: object
                      $ref: '#/components/schemas/InterpretationStatus'
                  required:
                    - voc_id
                    - interpretation
                    - tags
                    - status
              required:
                - interpretation
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                description: 暂无文档
                properties:
                  interpretation:
                    description: 释义<br><br>引用自：[Interpretation](/schemas/Interpretation)
                    type: object
                    $ref: '#/components/schemas/Interpretation'
                required:
                  - interpretation
      parameters: []
      security:
        - user:
            - ''
  /api/v1/interpretations/{id}:
    servers: *ref_0
    post:
      tags:
        - 释义
        - 墨墨背单词
      operationId: >-
        maimemo.openapi.interpretation.v1.InterpretationService.UpdateInterpretation
      summary: 更新释义
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: 暂无文档
              properties:
                interpretation:
                  description: ''
                  type: object
                  properties:
                    interpretation:
                      description: 释义
                      type: string
                      example: n. 苹果
                    tags:
                      description: 标签
                      type: array
                      example:
                        - 考研
                      items:
                        type: string
                    status:
                      description: >-
                        状态

                        @Example
                        PUBLISHED<br><br>引用自：[InterpretationStatus](/schemas/InterpretationStatus)
                      type: object
                      $ref: '#/components/schemas/InterpretationStatus'
                  required:
                    - interpretation
                    - tags
                    - status
              required:
                - interpretation
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                description: 暂无文档
                properties:
                  interpretation:
                    description: 释义<br><br>引用自：[Interpretation](/schemas/Interpretation)
                    type: object
                    $ref: '#/components/schemas/Interpretation'
                required:
                  - interpretation
      parameters:
        - name: id
          in: path
          deprecated: false
          required: true
          description: 释义 id
          schema:
            description: 释义 id
            type: string
            example: 5a7BFf4F63612e5AD9fdebB7a50D3881
      security:
        - user:
            - ''
    delete:
      tags:
        - 释义
        - 墨墨背单词
      operationId: >-
        maimemo.openapi.interpretation.v1.InterpretationService.DeleteInterpretation
      summary: 删除释义
      requestBody: {}
      responses: {}
      parameters:
        - name: id
          in: path
          deprecated: false
          required: true
          description: 释义 id
          schema:
            description: 释义 id
            type: string
            example: 5a7BFf4F63612e5AD9fdebB7a50D3881
      security:
        - user:
            - ''
