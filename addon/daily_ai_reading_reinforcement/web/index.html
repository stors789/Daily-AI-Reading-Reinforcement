<main class="app-shell">
  <header class="topbar">
    <div>
      <p class="eyebrow" id="eyebrowText">Daily AI Reading</p>
      <h1 id="titleText">Reading Reinforcement</h1>
    </div>
    <div class="top-actions">
      <select id="uiLanguageSelect" class="language-select">
        <option value="zh">中文</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
      </select>
      <div class="day-window" id="dayWindow">Loading Anki day...</div>
    </div>
  </header>

  <section class="workspace">
    <div class="left-stack">
      <aside class="panel deck-panel">
        <div class="panel-heading">
          <h2 id="decksHeading">Studied Decks</h2>
          <button class="icon-button" id="refreshButton" title="Refresh">↻</button>
        </div>
        <div class="deck-list" id="deckList"></div>
      </aside>

      <section class="panel field-panel">
        <div class="panel-heading">
          <h2 id="fieldsHeading">AI Fields</h2>
          <div class="button-row">
            <button class="secondary-button" id="selectAllFieldsButton" disabled>All</button>
            <button class="secondary-button" id="invertFieldsButton" disabled>Invert</button>
            <button class="secondary-button" id="saveFieldsButton" disabled>Save</button>
          </div>
        </div>
        <div class="field-list" id="fieldList">
          <div class="empty" id="fieldEmptyText">Select a deck</div>
        </div>
      </section>
    </div>

    <section class="panel card-panel">
      <div class="panel-heading">
        <h2 id="cardsHeading">Cards</h2>
        <span class="muted" id="cardCount">Select a deck</span>
      </div>
      <div class="card-list" id="cardList"></div>
    </section>

    <section class="panel article-panel">
      <div class="panel-heading">
        <h2 id="articleHeading">Article</h2>
        <button class="primary-button" id="generateButton" disabled>Generate</button>
      </div>
      <div class="preset-editor">
        <div class="preset-row">
          <select id="presetSelect"></select>
          <button class="secondary-button" id="newPresetButton">New</button>
          <button class="secondary-button" id="savePresetButton">Save</button>
          <button class="secondary-button" id="deletePresetButton">Delete</button>
        </div>
        <div class="preset-grid">
          <input id="presetName" placeholder="Preset name">
          <input id="presetLanguage" placeholder="Language">
          <input id="presetDifficulty" placeholder="Difficulty">
        </div>
        <textarea id="presetInstructions" rows="3" placeholder="Extra prompt instructions"></textarea>
      </div>
      <div class="status" id="status">Choose a deck studied today.</div>
      <article class="article-output" id="articleOutput"></article>
      <div class="saved-paths" id="savedPaths"></div>
    </section>
  </section>
</main>
