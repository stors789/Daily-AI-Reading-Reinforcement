<main class="app-shell">
  <header class="topbar">
    <div>
      <p class="eyebrow" id="eyebrowText">Daily AI Reading</p>
      <h1 id="titleText">Reading Reinforcement</h1>
    </div>
    <div class="top-actions">
      <button class="secondary-button" id="historyButton" title="历史文章">历史文章</button>
      <button class="secondary-button" id="desktopSettingsButton" title="设置">设置</button>
      <select id="uiLanguageSelect" class="language-select">
        <option value="zh">中文</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
      </select>
      <div class="day-window" id="dayWindow">Loading Anki day...</div>
    </div>
  </header>

  <section class="panel history-panel" id="historyPanel" style="display: none;">
    <div class="panel-heading">
      <h2 id="historyHeading">历史文章</h2>
      <button class="secondary-button" id="historyCloseButton">✕</button>
    </div>
    <div class="history-body" id="historyBody">
      <div class="history-decks" id="historyDecks">
        <div class="empty" id="historyEmptyText">没有已保存的文章。</div>
      </div>
      <div class="history-right" id="historyRight">
        <div class="history-heatmap" id="historyHeatmap"></div>
        <div class="history-articles" id="historyArticles"></div>
      </div>
    </div>
  </section>

  <section class="panel desktop-settings-panel" id="desktopSettingsPanel" style="display: none;">
    <div class="panel-heading">
      <h2 id="desktopSettingsHeading">设置</h2>
      <button class="secondary-button" id="desktopSettingsCloseButton">✕</button>
    </div>
    <div class="desktop-settings-body">
      <label class="form-field">
        <span id="momoApiKeyLabel">墨墨 API</span>
        <input id="momoApiKeyInput" type="password" autocomplete="off">
      </label>
      <label class="inline-check">
        <input id="clearMomoApiKeyInput" type="checkbox">
        <span id="clearMomoApiKeyLabel">清除已保存的墨墨 API</span>
      </label>
      <label class="form-field compact-field">
        <span id="momoDayStartLabel">一天开始</span>
        <input id="momoDayStartInput" type="time">
      </label>
      <label class="form-field compact-field">
        <span id="momoDayEndLabel">一天结束</span>
        <input id="momoDayEndInput" type="time">
      </label>
      <div class="settings-actions">
        <span class="muted" id="momoApiKeyStatus">未保存</span>
        <button class="secondary-button" id="saveDesktopSettingsButton">保存设置</button>
      </div>
    </div>
  </section>

  <section class="workspace">
    <div class="left-stack">
      <aside class="panel deck-panel">
        <div class="panel-heading">
          <h2 id="decksHeading">Studied Decks</h2>
          <button class="icon-button" id="refreshButton" title="Refresh">↻</button>
        </div>
        <div class="deck-list" id="deckList"></div>
      </aside>

      <section class="panel field-panel">
        <div class="panel-heading">
          <h2 id="fieldsHeading">AI Fields</h2>
          <div class="button-row">
            <button class="secondary-button" id="selectAllFieldsButton" disabled>All</button>
            <button class="secondary-button" id="invertFieldsButton" disabled>Invert</button>
            <button class="secondary-button" id="saveFieldsButton" disabled>Save</button>
          </div>
        </div>
        <div class="field-list" id="fieldList">
          <div class="empty" id="fieldEmptyText"></div>
        </div>
      </section>

      <section class="panel settings-panel">
        <div class="panel-heading">
          <h2 id="settingsHeading">API Settings</h2>
          <span class="muted" id="apiKeyStatus">No key</span>
        </div>
        <div class="settings-editor">
          <label class="form-field">
            <span id="providerLabel">Provider</span>
            <select id="providerSelect"></select>
          </label>
          <label class="form-field">
            <span id="baseUrlLabel">Base URL</span>
            <input id="baseUrlInput" autocomplete="off">
          </label>
          <label class="form-field">
            <span id="apiKeyLabel">API key</span>
            <input id="apiKeyInput" type="password" autocomplete="off">
          </label>
          <label class="inline-check" style="margin-top: -12px; margin-bottom: 12px;">
            <input id="clearApiKeyInput" type="checkbox">
            <span id="clearApiKeyLabel">Clear saved key</span>
          </label>
          <label class="form-field">
            <span id="modelLabel">Model</span>
            <input id="modelInput" autocomplete="off">
            <div class="model-tools">
              <button class="secondary-button" id="fetchModelsButton" type="button">获取模型</button>
              <select id="modelSelect" disabled>
                <option value="">选择模型</option>
              </select>
            </div>
          </label>
          <label class="form-field compact-field">
            <span id="temperatureLabel">Temperature</span>
            <input id="temperatureInput" type="number" min="0" max="2" step="0.1">
          </label>
          <label class="form-field compact-field">
            <span id="maxTokensLabel">Max tokens</span>
            <input id="maxTokensInput" type="number" min="128" max="32000" step="1">
          </label>
          <button class="secondary-button full-button" id="saveApiSettingsButton" style="margin-top: 16px;">Save API settings</button>
        </div>
      </section>
    </div>

    <section class="panel card-panel">
      <div class="panel-heading">
        <h2 id="cardsHeading">Cards</h2>
        <div class="card-heading-actions">
          <span class="muted" id="cardCount"></span>
          <div class="button-row compact-buttons">
            <button class="secondary-button" id="selectAllCardsButton" disabled>All</button>
            <button class="secondary-button" id="selectNewCardsButton" disabled>New</button>
            <button class="secondary-button" id="selectFailedCardsButton" disabled>Failed</button>
            <button class="secondary-button" id="selectVagueCardsButton" disabled>Vague</button>
            <button class="secondary-button" id="clearCardSelectionButton" disabled>Clear</button>
          </div>
        </div>
      </div>
      <div class="card-list" id="cardList"></div>
    </section>

    <section class="panel article-panel">
      <div class="panel-heading">
        <h2 id="articleHeading">Article</h2>
        <div class="button-row">
          <button class="secondary-button" id="returnToSelectionButton" style="display: none;">Return to selection</button>
          <button class="secondary-button" id="regenerateButton" style="display: none;">Regenerate</button>
          <button class="secondary-button" id="saveArticleToCardButton" style="display: none;">Save to Card</button>
          <div class="writing-mode-buttons" id="writingModeButtons" style="display: none;">
            <button class="secondary-button active" id="writingModeHorizontal" data-mode="horizontal">横</button>
            <button class="secondary-button" id="writingModeVertical" data-mode="vertical">縦</button>
          </div>
          <button class="primary-button" id="generateButton" disabled>Generate</button>
        </div>
      </div>
      <div class="preset-editor">
        <div class="preset-row">
          <select id="presetSelect"></select>
          <button class="secondary-button" id="newPresetButton">New</button>
          <button class="secondary-button" id="savePresetButton">Save</button>
          <button class="secondary-button" id="deletePresetButton">Delete</button>
        </div>
        <div class="preset-grid">
          <input id="presetName" placeholder="Preset name">
          <input id="presetReaderNativeLanguage" placeholder="Reader Native Language">
          <input id="presetArticleLanguage" placeholder="Article Language">
          <input id="presetDifficulty" placeholder="Difficulty">
          <input id="presetMaxWords" placeholder="Word range">
        </div>
        <textarea id="presetInstructions" rows="3" placeholder="Formatting requirements"></textarea>
        <div class="article-card-destination" id="articleCardDeckHint"></div>
      </div>
     <div class="status" id="status">Choose a deck studied today.</div>
     <div class="provider-offline" id="providerOffline" hidden>
       <span id="providerOfflineMessage"></span>
       <button class="secondary-button" id="providerRetryButton" type="button">重试</button>
     </div>
      <div class="article-output" id="articleOutput">
        <header class="reading-header" id="readingHeader" hidden></header>
        <div class="reading-tabs" id="readingTabs">
          <button class="reading-tab active" id="readingTabArticle" type="button" data-tab="article">Article</button>
          <button class="reading-tab" id="readingTabNotes" type="button" data-tab="notes">Notes</button>
        </div>
        <div class="article-scroll" id="articleScroll"></div>
        <aside class="notes-panel" id="notesPanel"></aside>
      </div>
     <div class="saved-paths" id="savedPaths"></div>
    </section>
  </section>
</main>
