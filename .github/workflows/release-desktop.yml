name: Release DAIRR desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer version to publish (without v)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          python3 -c 'import re, sys; sys.exit(0 if re.fullmatch(r"(?:0|[1-9]\\d*)\\.(?:0|[1-9]\\d*)\\.(?:0|[1-9]\\d*)(?:-[0-9A-Za-z.-]+)?(?:\\+[0-9A-Za-z.-]+)?", sys.argv[1]) else 1)' "$VERSION"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: verify-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            updater_target: darwin-aarch64
            sidecar_target: aarch64-apple-darwin
          - runner: macos-13
            updater_target: darwin-x86_64
            sidecar_target: x86_64-apple-darwin
          - runner: windows-latest
            updater_target: windows-x86_64
            sidecar_target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY_PASSWORD }}
      TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
      WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Python sidecar builder
        run: python -m pip install --upgrade pyinstaller
      - name: Install desktop build dependencies
        working-directory: apps/desktop
        run: npm ci
      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS'
        shell: bash
        run: |
          test -n "$APPLE_CERTIFICATE"
          test -n "$APPLE_CERTIFICATE_PASSWORD"
          test -n "$KEYCHAIN_PASSWORD"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import "$RUNNER_TEMP/certificate.p12" -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          APPLE_SIGNING_IDENTITY="$(security find-identity -v -p codesigning build.keychain | grep 'Developer ID Application' | head -1 | awk -F'"' '{print $2}')"
          test -n "$APPLE_SIGNING_IDENTITY"
          echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY" >> "$GITHUB_ENV"
      - name: Import Windows Authenticode certificate
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE)) { throw "WINDOWS_CERTIFICATE is required" }
          $pfxPath = Join-Path $env:RUNNER_TEMP "dairr-signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $password = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $password | Out-Null
          Remove-Item $pfxPath -Force
      - name: Validate signing inputs and prepare release config
        shell: bash
        run: |
          test -n "$TAURI_SIGNING_PRIVATE_KEY"
          test -n "$TAURI_UPDATER_PUBLIC_KEY"
          test -n "$WINDOWS_CERTIFICATE_THUMBPRINT"
          test -n "$WINDOWS_TIMESTAMP_URL"
          python3 scripts/desktop_release.py prepare-config \
            --version "${{ needs.verify-release.outputs.version }}" \
            --updater-public-key "$TAURI_UPDATER_PUBLIC_KEY" \
            --windows-certificate-thumbprint "$WINDOWS_CERTIFICATE_THUMBPRINT" \
            --windows-timestamp-url "$WINDOWS_TIMESTAMP_URL" \
            --output "$RUNNER_TEMP/tauri.release.json"
      - name: Build native Python sidecar
        shell: bash
        run: |
          python3 package_tauri_sidecar.py --target-triple "${{ matrix.sidecar_target }}" --clean
          python3 package_tauri_sidecar.py --target-triple "${{ matrix.sidecar_target }}" --check-placeholder
      - name: Build signed Tauri updater bundle
        working-directory: apps/desktop
        shell: bash
        run: npm run build -- --config "$RUNNER_TEMP/tauri.release.json"
      - name: Stage updater artifacts
        shell: bash
        run: |
          python3 scripts/desktop_release.py collect-artifacts \
            --target "${{ matrix.updater_target }}" \
            --bundle-dir apps/desktop/src-tauri/target/release/bundle \
            --output-dir release-assets
      - uses: actions/upload-artifact@v4
        with:
          name: dairr-release-${{ matrix.updater_target }}
          path: release-assets/
          if-no-files-found: error

  publish:
    needs: [verify-release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: dairr-release-*
          path: release-assets
          merge-multiple: true
      - name: Create static updater manifest
        shell: bash
        run: |
          python3 scripts/desktop_release.py latest-json \
            --version "${{ needs.verify-release.outputs.version }}" \
            --base-url "https://github.com/${{ github.repository }}/releases/download/${{ needs.verify-release.outputs.tag }}" \
            --input-dir release-assets \
            --output release-assets/latest.json \
            --notes "See the GitHub Release notes for DAIRR ${{ needs.verify-release.outputs.tag }}."
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-release.outputs.tag }}
          generate_release_notes: true
          files: release-assets/*
